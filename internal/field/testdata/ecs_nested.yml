# Minimal ecs_nested.yml fixture for testing — mirrors the structure of a real
# generated ECS nested.yml but trimmed to a small representative set.

base:
  description: The base fieldset contains all fields which are at the root of the events.
  short: All fields at the root of the events.
  fields:
    "@timestamp":
      type: date
      level: core
      short: Date/time when the event originated.
      description: >
        Date/time when the event originated. This is the date/time extracted from
        the event, typically representing when the event was generated by the source.
      example: "2016-05-23T08:05:34.853Z"
    message:
      type: match_only_text
      level: core
      short: Log message optimized for viewing in a log viewer.
      description: >
        For log events the message field contains the log message, optimized for
        viewing in a log viewer. For structured logs without an original message
        field, other fields can be concatenated to form a human-readable summary
        of the event.
      example: Hello World

event:
  description: The event fields are used for context information about the data itself.
  short: Fields about the event.
  fields:
    event.category:
      type: keyword
      level: core
      short: Event category. The second categorization field.
      description: >
        This is one of four ECS Categorization Fields, and indicates the second
        level in the ECS category hierarchy.
      example: authentication
      allowed_values:
        - name: authentication
          description: Events in this category are related to the challenge and response process.
          expected_event_types:
            - start
            - end
            - info
        - name: network
          description: Events in this category are related to network activity.
          expected_event_types:
            - connection
            - end
            - info
            - start
    event.kind:
      type: keyword
      level: core
      short: The kind of the event.
      description: >
        This is one of four ECS Categorization Fields, and indicates the highest
        level in the ECS category hierarchy.
      example: event
    event.outcome:
      type: keyword
      level: core
      short: The outcome of the event.
      description: >
        This is one of four ECS Categorization Fields, and indicates the lowest
        level in the ECS category hierarchy.
      example: success
      allowed_values:
        - name: failure
          description: Indicates that this event describes a failed action.
          expected_event_types: []
        - name: success
          description: Indicates that this event describes a successful action.
          expected_event_types: []

process:
  description: Fields about the process that generated the event.
  short: Information about the process.
  reusable:
    top_level: true
  fields:
    process.pid:
      type: long
      level: core
      short: Process id.
      description: Process id.
      example: "4242"
    process.name:
      type: keyword
      level: extended
      short: Process name.
      description: Process name.
      example: ssh
    process.args:
      type: keyword
      level: extended
      short: Array of process arguments.
      description: Array of process arguments, starting with the absolute path to the executable.
      example: /usr/bin/ssh
      normalize:
        - array

os:
  description: The OS fields contain information about the operating system.
  short: OS fields contain information about the operating system.
  reusable:
    top_level: false
  fields:
    os.name:
      type: keyword
      level: extended
      short: Operating system name, without the version.
      description: Operating system name, without the version.
      example: Mac OS X
      original_fieldset: host
    os.type:
      type: keyword
      level: extended
      short: Operating system type.
      description: >
        Use the os.type field to categorize the operating system into one of
        the broad commercial families.
      example: macos
